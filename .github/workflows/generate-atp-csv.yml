name: Generate ATP Full Draw CSV

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

jobs:
  generate-csv:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Show repository structure
        run: |
          pwd
          ls -la
          find . -maxdepth 2 -type f | sort

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -V
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run script
        run: |
          python miami_draw_results_to_csv.py
          echo "----- AFTER SCRIPT -----"
          ls -la
          find . -maxdepth 2 -type f | sort

      - name: Verify CSV exists
        run: |
          if [ ! -f miami_full_draw.csv ]; then
            echo "CSV non trovato!"
            exit 1
          fi
          echo "CSV trovato correttamente"

      - name: Upload CSV as artifact
        uses: actions/upload-artifact@v6
        with:
          name: atp-full-draw-csv
          path: miami_full_draw.csv

      - name: Commit generated CSV to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add miami_full_draw.csv
          git commit -m "Update ATP full draw CSV" || echo "Nessuna modifica da committare"
          git push
